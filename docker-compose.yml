version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: screenflow
      POSTGRES_PASSWORD: screenflow
      POSTGRES_DB: screenflow
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      POSTGRES_USER: screenflow
      POSTGRES_PASSWORD: screenflow
      POSTGRES_DB: screenflow
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    volumes:
      - ./media:/app/media
      - ./license.json:/app/license.json:ro
      - ./license_public.pem:/app/license_public.pem:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:

